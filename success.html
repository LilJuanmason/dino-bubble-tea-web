<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Exitoso - Dino Bubble Tea</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .success-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background-color: var(--bg-color);
        }

        .success-card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        .success-icon {
            font-size: 5rem;
            color: var(--accent-green);
            margin-bottom: 1rem;
        }

        .qr-placeholder {
            width: 250px;
            height: 250px;
            background-color: #f5f5f5;
            margin: 2rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 2px dashed #ccc;
        }

        #qrcode canvas {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="success-container">
        <div class="success-card">
            <i class="fas fa-check-circle success-icon"></i>
            <h1 style="color: var(--text-dark); margin-bottom: 1rem;">¡Pago Exitoso!</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Tu pedido ha sido confirmado. Presenta este código
                QR en sucursal para recoger tu bebida.</p>

            <div id="qrcode" class="qr-placeholder">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: #ccc;"></i>
            </div>

            <p style="font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem;">Pedido: <span id="order-id-display"
                    style="color: var(--primary-color);">Cargando...</span></p>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 2rem;">Te enviemos un mensaje de
                confirmación por WhatsApp en breve.</p>

            <a href="index.html" class="primary-btn" style="text-decoration: none; display: inline-block;">Volver al
                Inicio</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const externalReference = urlParams.get('external_reference'); // MercadoPago sends this
            const orderId = urlParams.get('order_id') || externalReference; // Fallback

            const displayEl = document.getElementById('order-id-display');
            const qrContainer = document.getElementById('qrcode');

            if (orderId) {
                // Shorten the UUID for display and QR
                const shortId = orderId.split('-')[0].toUpperCase();
                displayEl.textContent = `#DINO-${shortId}`;

                qrContainer.innerHTML = ''; // Clear spinner

                // Generate QR Code with the order ID info
                const qrData = JSON.stringify({ orderId: orderId, displayId: `DINO-${shortId}`, source: 'web' });

                new QRCode(qrContainer, {
                    text: qrData,
                    width: 250,
                    height: 250,
                    colorDark: "#1e3932",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            } else {
                displayEl.textContent = "Desconocido";
                qrContainer.innerHTML = '<p style="color:red; text-align:center; padding: 2rem;">No se encontró ID de orden. Por favor muestra tu recibo de pago.</p>';
            }

            // Clear cart from local storage/memory if applicable (since it's memory based, a refresh clears it anyway)
        });
    </script>
</body>

</html>
